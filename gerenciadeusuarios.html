<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADM - Gerenciamento de Usuários</title>
<style>
body { margin:0; font-family: 'Segoe UI', Tahoma, sans-serif; background:#f5f6fa; }
.container { max-width:800px; margin:50px auto; background:white; padding:30px; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.2); }
h2 { text-align:center; margin-bottom:30px; }
table { width:100%; border-collapse:collapse; margin-bottom:20px; }
th, td { padding:12px; border-bottom:1px solid #ddd; text-align:left; }
tr:hover { background:#f1f1f1; }
input, select { padding:10px; margin:5px 0; width:100%; border-radius:6px; border:1px solid #ccc; }
button { padding:10px 20px; border:none; border-radius:6px; background:#6c5ce7; color:white; cursor:pointer; margin-top:10px; transition:0.3s; }
button:hover { background:#a29bfe; }
.error { color:red; display:none; margin-top:10px; }
</style>
</head>
<body>

<div class="container">
    <h2>Gerenciamento de Usuários - ADM</h2>

    <table id="usersTable">
        <tr>
            <th>Usuário</th>
            <th>Senha</th>
            <th>Tipo</th>
        </tr>
    </table>

    <h3>Adicionar Novo Usuário</h3>
    <input type="text" id="newUsername" placeholder="Nome do Usuário">
    <input type="password" id="newPassword" placeholder="Senha">
    <select id="newRole">
        <option value="visitante">Visitante</option>
        <option value="enfermeiro">Enfermeiro</option>
        <option value="chefe">Chefe</option>
    </select>
    <button onclick="addUser()">Adicionar Usuário</button>
    <div class="error" id="errorMsg">Preencha todos os campos corretamente!</div>
</div>

<script>

// Inicializa usuários no localStorage se ainda não existirem
if(!localStorage.getItem('users')){
    const defaultUsers = [
        {username:'visitante', password:'123', role:'visitante'},
        {username:'enfermeiro', password:'123', role:'enfermeiro'},
        {username:'chefe', password:'123', role:'chefe'}
    ];
    localStorage.setItem('users', JSON.stringify(defaultUsers));
}

// Carrega usuários na tabela
function loadUsers(){
    const users = JSON.parse(localStorage.getItem('users'));
    const table = document.getElementById('usersTable');
    
    // Remove linhas antigas, mantém cabeçalho
    table.innerHTML = `<tr>
            <th>Usuário</th>
            <th>Senha</th>
            <th>Tipo</th>
        </tr>`;
    
    users.forEach(u => {
        let row = table.insertRow();
        row.insertCell(0).innerText = u.username;
        row.insertCell(1).innerText = u.password;
        row.insertCell(2).innerText = u.role;
    });
}

// Adiciona usuário
function addUser(){
    const username = document.getElementById('newUsername').value.trim();
    const password = document.getElementById('newPassword').value.trim();
    const role = document.getElementById('newRole').value;

    if(!username || !password){
        document.getElementById('errorMsg').style.display = 'block';
        return;
    } else {
        document.getElementById('errorMsg').style.display = 'none';
    }

    let users = JSON.parse(localStorage.getItem('users'));
    
    // Evita duplicidade de usuário
    if(users.some(u => u.username.toLowerCase() === username.toLowerCase())){
        alert("Usuário já existe!");
        return;
    }

    users.push({username,password,role});
    localStorage.setItem('users', JSON.stringify(users));
    loadUsers();

    // Limpa campos
    document.getElementById('newUsername').value = '';
    document.getElementById('newPassword').value = '';
}

// Carrega a tabela ao iniciar
loadUsers();
</script>

</body>
</html>
